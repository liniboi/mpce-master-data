name: Auto Update Addons Index

on:
  push:
    paths:
      - 'links.txt'
      - '*.mcpack'
      - 'update_library.py'
  workflow_dispatch:  # This enables the "Run workflow" button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Debug File List
      run: |
        echo "Listing all files in the current directory:"
        ls -R

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install beautifulsoup4 requests

    - name: Run Processing Script
      env:
        PYTHONUNBUFFERED: 1
      run: python update_library.py

    - name: Save Changes Back to Repo
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated library sync [skip ci]"
